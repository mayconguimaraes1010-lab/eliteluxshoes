<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliteFootwear</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h2>EliteLuxShoes</h2>
    <div class="cart">
        🛒 <span id="cart-count">0</span> itens |
        R$ <span id="cart-total">0.00</span>
    </div>
</header>

<div class="container">

    <input type="text" id="search" placeholder="Buscar tênis de luxo..." onkeyup="buscar()">

    <div class="produtos" id="produtos"></div>

    <div class="carrinho">
        <h3>Seu Carrinho</h3>
        <ul id="lista"></ul>
        <button class="finalizar" onclick="finalizar()">Finalizar Compra</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
